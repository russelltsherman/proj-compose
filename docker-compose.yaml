name: proj-go

services:
  api:
    build:
      dockerfile: Dockerfile.dev
      context: './api'
    environment:
      ENV: LOCAL
      PGUSER: ${DBUSER}
      PGHOST: ${DBHOST}
      PGDATABASE: ${DBDATABASE}
      PGPORT: ${DBPORT}
      PGPASSWORD: ${DBPASSWORD}
      REDISPORT: ${REDISPORT}
      REDISHOST: ${REDISHOST}
    depends_on:
      - db
      - cache
    ports:
      - ${APIPORT}:8080
    restart: on-failure
    volumes:
      - ./api:/app

  client:
    build:
      dockerfile: Dockerfile.dev
      context: './client'
    depends_on:
      - api
    ports:
      - ${CLIENTPORT}:3000
    restart: on-failure
    volumes:
      - ./client/public:/app/public
      - ./client/src:/app/src

  nginx:
    build:
      dockerfile: Dockerfile.dev
      context: ./nginx
    depends_on:
      - api
      - client
    ports:
      - '3050:80'
    restart: always

  pgadmin:
    environment:
      PGADMIN_DEFAULT_EMAIL: ${DBADMINEMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${DBPASSWORD}
    configs:
      - source: servers.json
        target: /pgadmin4/servers.json
      - source: pgpass
        target: /var/lib/pgadmin/storage/${DBADMINDIR}/.pgpass
    depends_on:
      - db
    entrypoint: |
      /bin/sh -c "chown pgadmin:root /var/lib/pgadmin/storage/${DBADMINDIR}/.pgpass; chmod 600 /var/lib/pgadmin/storage/${DBADMINDIR}/.pgpass; /entrypoint.sh;"
    image: dpage/pgadmin4
    ports:
      - ${PGADMINPORT}:80
    restart: always
    user: root
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  db:
    configs:
      - source: init.sql
        target: /docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: ${DBUSER}
      POSTGRES_PASSWORD: ${DBPASSWORD}
      POSTGRES_DB: ${DBDATABASE}
    image: postgres:latest
    ports:
      - ${DBPORT}:5432
    volumes:
      - db-data:/var/lib/postgresql/data

  # does not appear to be respecting the requirepass flag
  cache:
    command: redis-server --save 20 1 --loglevel ${REDISLOGLEVEL} --port ${REDISPORT} --requirepass ${REDISPASSWORD}
    image: redis:7.2-alpine
    ports:
      - ${REDISPORT}:6379
    volumes:
      - cache-data:/data

configs:
  pgpass:
    content: db:${DBPORT}:*:${DBUSER}:${DBPASSWORD}
  servers.json:
    content: |
      {
        "Servers": {
          "1": {
            "Group": "Servers",
            "Name": "Docker Compose",
            "Host": "db",
            "Port": ${DBPORT},
            "MaintenanceDB": "postgres",
            "Username": "${DBUSER}",
            "PassFile": "/.pgpass",
            "SSLMode": "prefer"
          }
        }
      }
  init.sql:
    content: |
      create database initdb;
      create user inituser with encrypted password 'initpass';
      grant all privileges on database initdb to inituser;

volumes:
  api-data:
  db-data:
  cache-data:
  pgadmin-data:
